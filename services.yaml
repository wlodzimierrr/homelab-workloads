services:
  - service_id: homelab-api
    name: Homelab API
    owner: wlodzimierrr
    repo_url: https://github.com/wlodzimierrr/homelab/tree/main/apps/portal/backend
    runbook_url: https://github.com/wlodzimierrr/homelab/blob/main/docs/runbooks/homelab-api-service-operations.md
    description: FastAPI backend for the homelab portal and service metadata APIs.
    observability:
      mode: app-native
    envs:
      - name: dev
        namespace: homelab-api
        argo_app: homelab-api-dev
      - name: prod
        namespace: homelab-api
        argo_app: homelab-api-prod
  - service_id: homelab-web
    name: Homelab Web
    owner: wlodzimierrr
    repo_url: https://github.com/wlodzimierrr/homelab/tree/main/apps/portal/frontend
    runbook_url: https://github.com/wlodzimierrr/homelab/blob/main/docs/runbooks/homelab-web-service-operations.md
    description: React frontend for the homelab portal UI.
    observability:
      mode: ingress-derived
    envs:
      - name: dev
        namespace: homelab-web
        argo_app: homelab-web-dev
      - name: prod
        namespace: homelab-web
        argo_app: homelab-web-prod
  - service_id: oauth2-proxy
    name: OAuth2 Proxy
    owner: wlodzimierrr
    repo_url: https://github.com/wlodzimierrr/homelab/tree/main/workloads/apps/homelab-web/envs/dev
    runbook_url: https://github.com/wlodzimierrr/homelab/blob/main/docs/runbooks/oidc-setup.md
    description: Support service providing ForwardAuth and login flows for the homelab web ingress.
    observability:
      mode: no-http
    envs:
      - name: dev
        namespace: homelab-web
        app_label: oauth2-proxy
        argo_app: homelab-web-dev
        workload_ref: apps/homelab-web/envs/dev/oauth2-proxy.yaml
