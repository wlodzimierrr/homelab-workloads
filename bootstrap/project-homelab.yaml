apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-bootstrap
  namespace: argocd
spec:
  description: Homelab bootstrap applications in argocd namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-platform
  namespace: argocd
spec:
  description: Homelab platform resources in platform namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: platform
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-monitoring
  namespace: argocd
spec:
  description: Homelab monitoring stack resources in monitoring namespace
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
    - https://prometheus-community.github.io/helm-charts
    - https://grafana.github.io/helm-charts
  destinations:
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-api
  namespace: argocd
spec:
  description: Homelab API resources in homelab-api namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: homelab-api
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-web
  namespace: argocd
spec:
  description: Homelab web resources in homelab-web namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: homelab-web
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-database
  namespace: argocd
spec:
  description: database for homelab resources in homelab-database namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: homelab-database
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: scaffold-smoke
  namespace: argocd
spec:
  description: Scaffold smoke-test service for validating platform bootstrapping and network reachability resources in scaffold-smoke namespace only
  sourceRepos:
    - https://github.com/wlodzimierrr/homelab-workloads.git
  destinations:
    - namespace: scaffold-smoke
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
