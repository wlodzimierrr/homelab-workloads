apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-web
  namespace: homelab-web
  labels:
    app.kubernetes.io/name: homelab-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-web
    spec:
      serviceAccountName: homelab-web
      containers:
        - name: web
          image: ghcr.io/wlodzimierrr/homelab-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
