apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
configMapGenerator:
  - name: homelab-web-runtime-config
    files:
      - runtime-config.js
commonLabels:
  homelab.env: prod
patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml
  - path: patch-ingress-api.yaml
