apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress-api-login.yaml
  - ingress-oauth2.yaml
  - oauth2-proxy.yaml
  - middleware-oauth2.yaml
  - networkpolicy-allow-ingress-oauth2-proxy.yaml
  - networkpolicy-allow-egress-oauth2-proxy.yaml
commonLabels:
  homelab.env: dev
patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml
  - path: patch-ingress-api.yaml
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: homelab-web
    path: patch-ingress-paths.json
