apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-web
  namespace: homelab-web
spec:
  replicas: 1
  template:
    spec:
      volumes:
        - name: runtime-config
          configMap:
            name: homelab-web-runtime-config
      containers:
        - name: web
          image: ghcr.io/wlodzimierrr/homelab-web:sha-58179662b091627b2f155947c274698b2586201c
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
