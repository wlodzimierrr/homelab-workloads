apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-web
  namespace: homelab-web
spec:
  replicas: 1
  template:
    spec:
      volumes:
        - name: runtime-config
          configMap:
            name: homelab-web-runtime-config
      containers:
        - name: web
          image: ghcr.io/wlodzimierrr/homelab-web:sha-5bac540ebf8248d5aaa250458e3175426daafa74
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
