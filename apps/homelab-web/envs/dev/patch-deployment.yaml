apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-web
  namespace: homelab-web
spec:
  replicas: 1
  template:
    spec:
      volumes:
        - name: runtime-config
          configMap:
            name: homelab-web-runtime-config
      containers:
        - name: web
          image: ghcr.io/wlodzimierrr/homelab-web:sha-d48f1c802e3d05bcc7fc3ed2e2a00256ae055408
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
