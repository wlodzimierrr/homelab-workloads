apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: homelab-web
  labels:
    app.kubernetes.io/name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.4.0
          imagePullPolicy: IfNotPresent
          args:
            - --provider=github
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --redirect-url=http://portal.dev.homelab.local/oauth2/callback
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-authorization-header=true
            - --pass-access-token=true
            - --cookie-secure=false
            - --cookie-samesite=lax
            - --email-domain=*
          envFrom:
            - secretRef:
                name: oauth2-proxy-secret
          ports:
            - name: http
              containerPort: 4180
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: homelab-web
  labels:
    app.kubernetes.io/name: oauth2-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
