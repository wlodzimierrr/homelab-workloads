apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-web-oauth2
  namespace: homelab-web
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "200"
spec:
  ingressClassName: traefik
  rules:
    - host: portal.dev.homelab.local
      http:
        paths:
          - path: /oauth2/
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
