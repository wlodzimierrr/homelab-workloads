apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-next
  namespace: portfolio-next
  labels:
    app.kubernetes.io/name: portfolio-next
    app.kubernetes.io/instance: portfolio-next
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-next
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-next
    spec:
      serviceAccountName: portfolio-next
      containers:
        - name: web
          image: ghcr.io/wlodzimierrr/portfolio-next:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_ENV
              value: base
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
