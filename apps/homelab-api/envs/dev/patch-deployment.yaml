apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-e1dc3e8baa070a68b54c9b60b4a72157e4200751
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
            - name: GIT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-git-github
                  key: GIT_GITHUB_TOKEN
                  optional: true
            - name: GHCR_READ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-ghcr-read
                  key: GHCR_READ_TOKEN
                  optional: true
