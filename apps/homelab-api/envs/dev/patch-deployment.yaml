apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-01a0e94385270d117f26bc858d6cb910ace59cfa
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
