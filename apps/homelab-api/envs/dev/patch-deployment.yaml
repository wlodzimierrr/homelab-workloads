apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-e1eec1c85d94d8f8b274dbd82fbf8dc0e9a69a8e
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
