apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-38c22b647aebe3220108d242a7b20666f6da0a58
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
