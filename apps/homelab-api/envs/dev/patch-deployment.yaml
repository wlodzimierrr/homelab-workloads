apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-7e884b1df20392ee94037a0e707443bf62f6f067
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
            - name: GIT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-git-github
                  key: GIT_GITHUB_TOKEN
                  optional: true
            - name: GHCR_READ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-ghcr-read
                  key: GHCR_READ_TOKEN
                  optional: true
            - name: SOPS_AGE_KEY_FILE
              value: /var/run/secrets/sops-age/keys.txt
          volumeMounts:
            - name: sops-age-key
              mountPath: /var/run/secrets/sops-age
              readOnly: true
      volumes:
        - name: sops-age-key
          secret:
            secretName: homelab-api-sops-age
            optional: true
