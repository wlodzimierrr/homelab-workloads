apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-c382ebbeaa145cd964ab75056a40f6d7539c30a9
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
