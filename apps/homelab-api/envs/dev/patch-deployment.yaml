apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-4ec32c65134b5d8476017c65c41e4d0dcb6c7e53
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
