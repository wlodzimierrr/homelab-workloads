apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-9d53314cd2814cde81a12112c7bcb57251d0a624
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
