apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-a394d62a575850ff346e69edadbffb55e3b3628b
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
