apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-04aea0869d105ee2332bf7e2ceb668ac4251c675
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
