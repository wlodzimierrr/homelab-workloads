apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-8357ecc687d365ea7306b6a880ad1aa62f1b4350
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
