apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-f8a3a8d65bc48ddb1b32629f4da4805b054f9b80
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
