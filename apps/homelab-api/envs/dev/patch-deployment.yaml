apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-d67680cef10868e24acdabd888a01302bb74307a
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
