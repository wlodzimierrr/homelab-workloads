apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-1e0372fe29b966544e9130c06c23933c29990e62
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
