apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-7a3e4eb6b589a8ccba4ac0b079c7d68c47b43319
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
            - name: GIT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-git-github
                  key: GIT_GITHUB_TOKEN
                  optional: true
