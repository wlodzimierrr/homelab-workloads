apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-9186ad09ea7affc42a70242670c7025ae872af51
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
