apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-c51b7f1c64a36c0158ba5d951e2f8405236ae22d
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
