apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-b370423ad80c673836e009294a3c6ae355ee66b4
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
