apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-28e45581f2cd11b04eb49deebbdd108d14b408e3
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
