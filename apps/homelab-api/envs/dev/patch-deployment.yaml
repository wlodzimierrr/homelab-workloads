apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-53b3bd9f7f9ff0a4906788df14c7b70e5e357b84
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
