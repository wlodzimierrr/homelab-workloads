apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-735129e6275f65d6e80d839bc6b46f6115f19244
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
