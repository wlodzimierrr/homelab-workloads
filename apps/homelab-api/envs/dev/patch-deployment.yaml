apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-a37c6b4747b9824c8b3417044da02670470fa195
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
