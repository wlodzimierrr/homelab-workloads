apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-8cc79b12f561b4ff36b79541bb0ce8693d8ca03a
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
