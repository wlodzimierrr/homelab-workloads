apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8000"
            - "-text=ok"
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
