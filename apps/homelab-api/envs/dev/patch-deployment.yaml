apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-5a9fdca1b52e1c47b8840c2f19af87e709f324ec
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
