apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-c60205a6773f41ff70180f3fc5b9f89f9e0d8bff
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
