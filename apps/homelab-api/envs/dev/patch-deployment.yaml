apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-a537c0e7825aa900a994a97823828b28010a4132
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
