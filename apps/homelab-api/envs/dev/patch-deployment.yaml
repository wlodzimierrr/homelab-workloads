apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-0bf64aa3dc6a8367c7138f2b1a4fb10a17a4e263
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
