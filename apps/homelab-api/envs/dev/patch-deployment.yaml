apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-f81acf310aa1b846633921a1b9c80fdea83c65e3
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
