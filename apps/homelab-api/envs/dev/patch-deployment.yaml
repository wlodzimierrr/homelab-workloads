apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-d642ac43f4b8ea76991cf9f66fbd3a0c88926a5b
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
