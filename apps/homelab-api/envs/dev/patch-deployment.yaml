apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-43d5169573fda00a6a43afd62db537794a13c1ef
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
            - name: PORTAL_GITHUB_ACTIONS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-github-actions
                  key: PORTAL_GITHUB_ACTIONS_TOKEN
            - name: GIT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-git-github
                  key: GIT_GITHUB_TOKEN
                  optional: true
            - name: GHCR_READ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homelab-api-ghcr-read
                  key: GHCR_READ_TOKEN
                  optional: true
