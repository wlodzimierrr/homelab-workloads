apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
  annotations:
    homelab.io/migration-strategy: forward-only-skip-db-ahead-v2
  labels:
    app.kubernetes.io/name: homelab-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-api
        app.kubernetes.io/component: api
        homelab.io/db-client: "true"
        homelab.io/gitops-reader: "true"
        homelab.io/kube-api-reader: "true"
        homelab.io/monitoring-reader: "true"
    spec:
      serviceAccountName: homelab-api-backend
      automountServiceAccountToken: true
      containers:
        - name: api
          image: ghcr.io/example/homelab-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OBS_METRICS_APP_LABEL
              value: homelab-api
            - name: APP_ENV
              value: base
            - name: LOG_LEVEL
              value: info
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@homelab-api-postgres:5432/$(POSTGRES_DB)
            - name: GITOPS_WORKLOADS_REPO_URL
              value: https://github.com/wlodzimierrr/homelab-workloads.git
            - name: GITOPS_WORKLOADS_REF
              value: main
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
