apiVersion: batch/v1
kind: Job
metadata:
  name: homelab-api-migrate
  namespace: homelab-api
  labels:
    app.kubernetes.io/name: homelab-api
    app.kubernetes.io/component: migration
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-api
        app.kubernetes.io/component: migration
        homelab.io/db-client: "true"
    spec:
      serviceAccountName: homelab-api-backend
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/example/homelab-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Wait until the Postgres service actually accepts TCP connections.
              python - <<'PY'
              import socket
              import time

              host = "homelab-api-postgres"
              port = 5432
              last_error = None
              for attempt in range(1, 61):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"postgres reachable on attempt {attempt}")
                          raise SystemExit(0)
                  except OSError as exc:
                      last_error = exc
                      time.sleep(2)
              raise SystemExit(f"postgres not reachable after retries: {last_error}")
              PY

              # Idempotent migration with retry for transient startup races.
              for attempt in $(seq 1 10); do
                if alembic upgrade head; then
                  exit 0
                fi
                echo "alembic attempt ${attempt} failed; retrying in 3s" >&2
                sleep 3
              done

              exit 1
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@homelab-api-postgres:5432/$(POSTGRES_DB)
