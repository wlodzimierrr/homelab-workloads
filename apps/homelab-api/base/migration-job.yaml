apiVersion: batch/v1
kind: Job
metadata:
  name: homelab-api-migrate
  namespace: homelab-api
  labels:
    app.kubernetes.io/name: homelab-api
    app.kubernetes.io/component: migration
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-api
        app.kubernetes.io/component: migration
        homelab.io/db-client: "true"
    spec:
      serviceAccountName: homelab-api-backend
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/example/homelab-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Wait until the Postgres service actually accepts TCP connections.
              python - <<'PY'
              import socket
              import time

              host = "homelab-api-postgres"
              port = 5432
              last_error = None
              for attempt in range(1, 61):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"postgres reachable on attempt {attempt}")
                          raise SystemExit(0)
                  except OSError as exc:
                      last_error = exc
                      time.sleep(2)
              raise SystemExit(f"postgres not reachable after retries: {last_error}")
              PY

              # Skip forward-only migrations when the database is already on a
              # newer Alembic revision than this image knows about. This lets
              # image rollbacks succeed without replaying an older migration set.
              python - <<'PY'
              import os

              from alembic.config import Config
              from alembic.runtime.migration import MigrationContext
              from alembic.script import ScriptDirectory
              from sqlalchemy import create_engine

              cfg = Config("alembic.ini")
              script = ScriptDirectory.from_config(cfg)
              known_revisions = {
                  revision.revision
                  for revision in script.walk_revisions(base="base", head="heads")
                  if revision.revision
              }
              image_heads = [revision for revision in script.get_heads() if revision]

              engine = create_engine(os.environ["DATABASE_URL"])
              with engine.connect() as connection:
                  context = MigrationContext.configure(connection)
                  current_heads = [revision for revision in context.get_current_heads() if revision]

              print(f"alembic image heads={image_heads} db heads={current_heads}")
              unknown_heads = [revision for revision in current_heads if revision not in known_revisions]
              if unknown_heads:
                  print(
                      "database is ahead of this image's migration set; "
                      f"skipping forward migration for rollback-safe sync: {unknown_heads}"
                  )
                  raise SystemExit(0)
              PY

              # Idempotent forward migration with retry for transient startup races.
              for attempt in $(seq 1 10); do
                if alembic upgrade head; then
                  exit 0
                fi
                echo "alembic attempt ${attempt} failed; retrying in 3s" >&2
                sleep 3
              done

              exit 1
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-api-postgres
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@homelab-api-postgres:5432/$(POSTGRES_DB)
