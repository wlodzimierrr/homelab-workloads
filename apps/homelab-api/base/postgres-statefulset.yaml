apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: homelab-api-postgres
  namespace: homelab-api
  labels:
    app.kubernetes.io/name: homelab-api
    app.kubernetes.io/component: postgres
spec:
  serviceName: homelab-api-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-api
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-api
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: homelab-api-postgres
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
