apiVersion: batch/v1
kind: CronJob
metadata:
  name: homelab-api-catalog-sync
  namespace: homelab-api
  labels:
    app.kubernetes.io/name: homelab-api
    app.kubernetes.io/component: catalog-sync
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: homelab-api
            app.kubernetes.io/component: catalog-sync
            homelab.io/db-client: "true"
            homelab.io/gitops-reader: "true"
            homelab.io/kube-api-reader: "true"
        spec:
          serviceAccountName: homelab-api-backend
          restartPolicy: Never
          containers:
            - name: catalog-sync
              image: ghcr.io/example/homelab-api:0.1.0
              imagePullPolicy: IfNotPresent
              command:
                - python
                - scripts/sync_catalog_registries.py
              env:
                - name: APP_ENV
                  value: base
                - name: LOG_LEVEL
                  value: info
                - name: PORTAL_ENV
                  value: dev
                - name: SERVICE_REGISTRY_SYNC_NAMESPACES
                  value: homelab-api,homelab-web,portfolio-next,scaffold-smoke,homelab-wordpress
                - name: REGISTRY_WARN_AFTER_MINUTES
                  value: "20"
                - name: REGISTRY_STALE_AFTER_MINUTES
                  value: "30"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: homelab-api-postgres
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: homelab-api-postgres
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: homelab-api-postgres
                      key: POSTGRES_PASSWORD
                - name: DATABASE_URL
                  value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@homelab-api-postgres:5432/$(POSTGRES_DB)
                - name: GITOPS_WORKLOADS_REPO_URL
                  value: https://github.com/wlodzimierrr/homelab-workloads.git
                - name: GITOPS_WORKLOADS_REF
                  value: main
