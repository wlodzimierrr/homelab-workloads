apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-egress
  namespace: my-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: my-service
      app.kubernetes.io/component: web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: my-service
              app.kubernetes.io/component: mysql
      ports:
        - protocol: TCP
          port: 3306
