apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: scaffold-smoke
  namespace: scaffold-smoke
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: scaffold-smoke
  namespaceSelector:
    matchNames:
      - scaffold-smoke
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
