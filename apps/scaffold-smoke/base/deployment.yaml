apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaffold-smoke
  namespace: scaffold-smoke
  labels:
    app.kubernetes.io/name: scaffold-smoke
    app.kubernetes.io/instance: scaffold-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scaffold-smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scaffold-smoke
    spec:
      serviceAccountName: scaffold-smoke
      containers:
        - name: app
          image: ghcr.io/wlodzimierrr/scaffold-smoke:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: base
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
