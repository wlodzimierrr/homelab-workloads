apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scaffold-smoke
  namespace: scaffold-smoke
  labels:
    app.kubernetes.io/name: scaffold-smoke
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: scaffold-smoke.dev.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scaffold-smoke
                port:
                  number: 80
