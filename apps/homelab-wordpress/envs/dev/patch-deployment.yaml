apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-wordpress
  namespace: homelab-wordpress
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
