apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-next-dev
  namespace: argocd
spec:
  project: portfolio-next
  source:
    repoURL: https://github.com/wlodzimierrr/homelab-workloads.git
    targetRevision: main
    path: apps/portfolio-next/envs/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-next
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
