apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dev
  namespace: argocd
spec:
  project: homelab-monitoring
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.5.2
    helm:
      releaseName: kube-prometheus-stack
      values: |
        defaultRules:
          create: true

        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        kubeScheduler:
          enabled: false
        coreDns:
          enabled: false

        alertmanager:
          enabled: true

        grafana:
          adminPassword: changeme-dev
          grafana.ini:
            server:
              domain: monitoring.homelab.local
              root_url: http://monitoring.homelab.local
            security:
              allow_embedding: true
          persistence:
            enabled: true
            size: 2Gi
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
              jsonData:
                maxLines: 1000
          dashboards:
            default:
              homelab-platform-health:
                json: |
                  {
                    "id": null,
                    "uid": "homelab-platform-health",
                    "title": "Homelab Platform Health",
                    "tags": ["homelab", "platform", "health"],
                    "timezone": "browser",
                    "schemaVersion": 39,
                    "version": 1,
                    "refresh": "30s",
                    "time": {
                      "from": "now-6h",
                      "to": "now"
                    },
                    "panels": [
                      {
                        "id": 1,
                        "type": "stat",
                        "title": "API Availability Ratio",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum(kube_deployment_status_replicas_available{namespace=\"homelab-api\",deployment=\"homelab-api\"}) / clamp_min(sum(kube_deployment_spec_replicas{namespace=\"homelab-api\",deployment=\"homelab-api\"}), 1)"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "unit": "percentunit",
                            "min": 0,
                            "max": 1,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "red", "value": null},
                                {"color": "green", "value": 1}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                          "colorMode": "value",
                          "graphMode": "none",
                          "justifyMode": "auto",
                          "orientation": "auto"
                        }
                      },
                      {
                        "id": 2,
                        "type": "stat",
                        "title": "Frontend Availability Ratio",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 6, "w": 6, "x": 6, "y": 0},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum(kube_deployment_status_replicas_available{namespace=\"homelab-web\",deployment=\"homelab-web\"}) / clamp_min(sum(kube_deployment_spec_replicas{namespace=\"homelab-web\",deployment=\"homelab-web\"}), 1)"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "unit": "percentunit",
                            "min": 0,
                            "max": 1,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "red", "value": null},
                                {"color": "green", "value": 1}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                          "colorMode": "value",
                          "graphMode": "none",
                          "justifyMode": "auto",
                          "orientation": "auto"
                        }
                      },
                      {
                        "id": 3,
                        "type": "stat",
                        "title": "DB Ready Replicas",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 6, "w": 6, "x": 12, "y": 0},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum(kube_statefulset_status_replicas_ready{namespace=\"homelab-api\",statefulset=\"homelab-api-postgres\"})"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "min": 0,
                            "max": 1,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "red", "value": null},
                                {"color": "green", "value": 1}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                          "colorMode": "value",
                          "graphMode": "none",
                          "justifyMode": "auto",
                          "orientation": "auto"
                        }
                      },
                      {
                        "id": 4,
                        "type": "stat",
                        "title": "API Restart Count (15m)",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"homelab-api\",container=\"api\"}[15m]))"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "min": 0,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "green", "value": null},
                                {"color": "yellow", "value": 1},
                                {"color": "red", "value": 3}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                          "colorMode": "value",
                          "graphMode": "none",
                          "justifyMode": "auto",
                          "orientation": "auto"
                        }
                      },
                      {
                        "id": 5,
                        "type": "timeseries",
                        "title": "Deployment Ready vs Desired Replicas",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum by (deployment, namespace) (kube_deployment_status_replicas_available{namespace=~\"homelab-api|homelab-web\",deployment=~\"homelab-api|homelab-web\"})",
                            "legendFormat": "{{namespace}}/{{deployment}} ready"
                          },
                          {
                            "refId": "B",
                            "expr": "sum by (deployment, namespace) (kube_deployment_spec_replicas{namespace=~\"homelab-api|homelab-web\",deployment=~\"homelab-api|homelab-web\"})",
                            "legendFormat": "{{namespace}}/{{deployment}} desired"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {"min": 0},
                          "overrides": []
                        },
                        "options": {
                          "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}
                        }
                      },
                      {
                        "id": 6,
                        "type": "timeseries",
                        "title": "Prototype Error Signal: API 5xx Rate (Traefik)",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "sum(rate(traefik_service_requests_total{code=~\"5..\",service=~\".*homelab-api.*\"}[5m]))",
                            "legendFormat": "api 5xx rps"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "min": 0,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "green", "value": null},
                                {"color": "yellow", "value": 0.01},
                                {"color": "red", "value": 0.05}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}
                        }
                      }
                    ]
                  }
              portal-service-embeds:
                json: |
                  {
                    "id": null,
                    "uid": "portal-service-embeds",
                    "title": "Portal Service Embeds",
                    "tags": ["homelab", "portal", "embed"],
                    "timezone": "browser",
                    "schemaVersion": 39,
                    "version": 1,
                    "refresh": "30s",
                    "editable": true,
                    "time": {
                      "from": "now-6h",
                      "to": "now"
                    },
                    "templating": {
                      "list": [
                        {
                          "name": "service",
                          "label": "Service ID",
                          "type": "textbox",
                          "query": "homelab-api",
                          "current": {"text": "homelab-api", "value": "homelab-api"}
                        },
                        {
                          "name": "namespace",
                          "label": "Namespace",
                          "type": "textbox",
                          "query": "homelab-api",
                          "current": {"text": "homelab-api", "value": "homelab-api"}
                        },
                        {
                          "name": "app",
                          "label": "App Label",
                          "type": "textbox",
                          "query": "homelab-api",
                          "current": {"text": "homelab-api", "value": "homelab-api"}
                        },
                        {
                          "name": "env",
                          "label": "Environment",
                          "type": "textbox",
                          "query": "dev",
                          "current": {"text": "dev", "value": "dev"}
                        },
                        {
                          "name": "argoApp",
                          "label": "Argo App",
                          "type": "textbox",
                          "query": "homelab-api-dev",
                          "current": {"text": "homelab-api-dev", "value": "homelab-api-dev"}
                        }
                      ]
                    },
                    "panels": [
                      {
                        "id": 2,
                        "type": "timeseries",
                        "title": "P95 Latency Trend",
                        "description": "Primary app metric with Traefik fallback for the selected service scope.",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "1000 * (histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\", app=\"$app\"}[5m]))) or histogram_quantile(0.95, sum by (le) (rate(traefik_service_request_duration_seconds_bucket{service=~\".*$app.*\"}[5m]))))",
                            "legendFormat": "{{app}} p95"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "unit": "ms",
                            "min": 0,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "green", "value": null},
                                {"color": "yellow", "value": 250},
                                {"color": "red", "value": 500}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
                          "tooltip": {"mode": "multi", "sort": "none"}
                        }
                      },
                      {
                        "id": 3,
                        "type": "timeseries",
                        "title": "Error Rate Trend",
                        "description": "Primary app metric with Traefik fallback for the selected service scope.",
                        "datasource": {"type": "prometheus", "uid": "prometheus"},
                        "gridPos": {"h": 9, "w": 24, "x": 0, "y": 9},
                        "targets": [
                          {
                            "refId": "A",
                            "expr": "100 * ((((sum(rate(http_requests_total{namespace=\"$namespace\", app=\"$app\", status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_requests_total{namespace=\"$namespace\", app=\"$app\"}[5m])), 0.000001))) or (((sum(rate(traefik_service_requests_total{service=~\".*$app.*\", code=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(traefik_service_requests_total{service=~\".*$app.*\"}[5m])), 0.000001))))",
                            "legendFormat": "{{app}} errors"
                          }
                        ],
                        "fieldConfig": {
                          "defaults": {
                            "unit": "percent",
                            "min": 0,
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {"color": "green", "value": null},
                                {"color": "yellow", "value": 1},
                                {"color": "red", "value": 3}
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "options": {
                          "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
                          "tooltip": {"mode": "multi", "sort": "none"}
                        }
                      }
                    ]
                  }
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

        prometheusOperator:
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 384Mi

        kube-state-metrics:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi

        prometheus:
          prometheusSpec:
            retention: 24h
            retentionSize: 3GiB
            walCompression: true
            resources:
              requests:
                cpu: 200m
                memory: 600Mi
              limits:
                cpu: 500m
                memory: 1Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 5Gi

        additionalPrometheusRulesMap:
          homelab-platform-health:
            groups:
              - name: homelab.platform.availability
                rules:
                  - alert: HomelabApiUnavailable
                    expr: kube_deployment_status_replicas_available{namespace="homelab-api",deployment="homelab-api"} < 1
                    for: 5m
                    labels:
                      severity: warning
                      service: homelab-api
                    annotations:
                      summary: "homelab-api has no available replicas"
                      description: "homelab-api deployment is unavailable for more than 5 minutes."
                  - alert: HomelabWebUnavailable
                    expr: kube_deployment_status_replicas_available{namespace="homelab-web",deployment="homelab-web"} < 1
                    for: 5m
                    labels:
                      severity: warning
                      service: homelab-web
                    annotations:
                      summary: "homelab-web has no available replicas"
                      description: "homelab-web deployment is unavailable for more than 5 minutes."
                  - alert: HomelabPostgresUnavailable
                    expr: kube_statefulset_status_replicas_ready{namespace="homelab-api",statefulset="homelab-api-postgres"} < 1
                    for: 5m
                    labels:
                      severity: warning
                      service: homelab-postgres
                    annotations:
                      summary: "homelab-api Postgres is not ready"
                      description: "Postgres StatefulSet has no ready replicas for more than 5 minutes."
              - name: homelab.platform.error-prototype
                rules:
                  - alert: HomelabApiRestartSpike
                    expr: sum(increase(kube_pod_container_status_restarts_total{namespace="homelab-api",container="api"}[15m])) > 2
                    for: 10m
                    labels:
                      severity: warning
                      service: homelab-api
                    annotations:
                      summary: "homelab-api restart spike"
                      description: "API container restarts exceeded prototype threshold in 15 minutes."
                  - alert: HomelabApi5xxRateHighPrototype
                    expr: sum(rate(traefik_service_requests_total{code=~"5..",service=~".*homelab-api.*"}[5m])) > 0.05
                    for: 10m
                    labels:
                      severity: warning
                      service: homelab-api
                    annotations:
                      summary: "homelab-api 5xx prototype threshold breached"
                      description: "Traefik 5xx request rate for homelab-api is above 0.05 rps (prototype threshold)."
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
