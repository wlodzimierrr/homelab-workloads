apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-ingress-dev
  namespace: argocd
spec:
  project: homelab-monitoring
  source:
    repoURL: https://github.com/wlodzimierrr/homelab-workloads.git
    targetRevision: main
    path: platform/monitoring/ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
