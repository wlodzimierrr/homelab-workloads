# Generated for future prod activation.
# Keep environments/prod/workloads/kustomization.yaml empty while single-cluster safety mode is active.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-next-prod
  namespace: argocd
spec:
  project: portfolio-next
  source:
    repoURL: https://github.com/wlodzimierrr/homelab-workloads.git
    targetRevision: main
    path: apps/portfolio-next/envs/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-next
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
