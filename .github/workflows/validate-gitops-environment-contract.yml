name: Validate GitOps Environment Contract

on:
  pull_request:
    paths:
      - "apps/**"
      - "bootstrap/**"
      - "environments/**"
      - "platform/**"
      - "scripts/**"
      - ".github/workflows/validate-gitops-environment-contract.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "bootstrap/**"
      - "environments/**"
      - "platform/**"
      - "scripts/**"
      - ".github/workflows/validate-gitops-environment-contract.yml"

permissions:
  contents: read

jobs:
  contract:
    name: Contract And Render Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Setup ksops
        run: |
          source <(curl -s https://raw.githubusercontent.com/viaduct-ai/kustomize-sops/master/scripts/install-ksops-archive.sh)
          command -v ksops
          echo "$(dirname "$(command -v ksops)")" >> "$GITHUB_PATH"

      - name: Run manifest guardrails
        run: |
          ./scripts/check-rbac-guardrails.sh
          ./scripts/check-secrets-guardrails.sh
          ./scripts/check-service-identity-contract.sh
          ./scripts/check-environment-contract.sh
          ./scripts/smoke-test-scaffold-generator.sh
